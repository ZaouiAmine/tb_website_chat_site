<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--surface2:#334155;--border:#475569;--text:#f1f5f9;--text2:#94a3b8;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
.login{display:flex;align-items:center;justify-content:center;height:100vh;padding:1rem}
.login-box{background:var(--surface);border-radius:16px;padding:2.5rem;width:100%;max-width:380px;box-shadow:0 25px 50px rgba(0,0,0,.4)}
.login-box h1{font-size:1.75rem;margin-bottom:.5rem;text-align:center}
.login-box p{color:var(--text2);text-align:center;margin-bottom:1.5rem;font-size:.9rem}
.login-box input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:1rem;outline:none;transition:border .2s}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:.75rem;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1rem;transition:background .2s}
.login-box button:hover{background:var(--accent2)}
.chat-wrap{display:none;flex-direction:column;height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h2{font-size:1.1rem;font-weight:600}
.status{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text2)}
.status .dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.status .dot.on{background:var(--green)}
.messages{flex:1;overflow-y:auto;padding:1rem 1.25rem;display:flex;flex-direction:column;gap:.5rem}
.msg{max-width:75%;padding:.6rem .9rem;border-radius:14px;font-size:.9rem;line-height:1.4;word-wrap:break-word}
.msg.other{background:var(--surface);align-self:flex-start;border-bottom-left-radius:4px}
.msg.self{background:var(--accent);align-self:flex-end;border-bottom-right-radius:4px}
.msg .name{font-size:.75rem;font-weight:600;color:var(--accent2);margin-bottom:.15rem}
.msg.self .name{color:rgba(255,255,255,.7)}
.msg .time{font-size:.65rem;color:rgba(255,255,255,.4);margin-top:.2rem;text-align:right}
.empty{color:var(--text2);text-align:center;margin:auto;font-size:.9rem}
.input-bar{background:var(--surface);border-top:1px solid var(--border);padding:.75rem 1rem;display:flex;gap:.5rem;flex-shrink:0}
.input-bar input{flex:1;padding:.7rem 1rem;border:1px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);font-size:.95rem;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar button{padding:.7rem 1.25rem;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s;white-space:nowrap}
.input-bar button:hover{background:var(--accent2)}
.input-bar button:disabled{opacity:.5;cursor:not-allowed}
@media(max-width:600px){.msg{max-width:88%}}
</style>
</head>
<body>

<div class="login" id="loginScreen">
  <div class="login-box">
    <h1>Chat</h1>
    <p>Enter a username to join the room</p>
    <input type="text" id="usernameInput" placeholder="Username" maxlength="24" autofocus>
    <button id="joinBtn" onclick="join()">Join</button>
  </div>
</div>

<div class="chat-wrap" id="chatScreen">
  <header>
    <h2>Chat Room</h2>
    <div class="status"><span class="dot" id="wsDot"></span><span id="wsLabel">Connecting...</span></div>
  </header>
  <div class="messages" id="messages"><div class="empty">No messages yet</div></div>
  <div class="input-bar">
    <input type="text" id="msgInput" placeholder="Type a message..." maxlength="500">
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
const API = window.location.origin;
let username = '';
let ws = null;
let seen = new Set();

function $(id){ return document.getElementById(id) }

function join(){
  const name = $('usernameInput').value.trim();
  if(!name) return;
  username = name;
  $('loginScreen').style.display = 'none';
  $('chatScreen').style.display = 'flex';
  loadHistory();
  connectWs();
}

$('usernameInput').addEventListener('keydown', function(e){ if(e.key==='Enter') join() });
$('msgInput').addEventListener('keydown', function(e){ if(e.key==='Enter') send() });

function loadHistory(){
  fetch(API + '/api/messages')
    .then(r => r.json())
    .then(data => {
      if(data.messages && data.messages.length > 0){
        data.messages.forEach(m => addMessage(m, false));
      }
    })
    .catch(()=>{});
}

function connectWs(){
  fetch(API + '/api/ws')
    .then(r => r.json())
    .then(data => {
      if(!data.url) return;
      ws = new WebSocket(data.url);
      ws.onopen = () => {
        $('wsDot').classList.add('on');
        $('wsLabel').textContent = 'Connected';
      };
      ws.onmessage = (evt) => {
        try {
          const msg = JSON.parse(evt.data);
          addMessage(msg, true);
        } catch(e){}
      };
      ws.onclose = () => {
        $('wsDot').classList.remove('on');
        $('wsLabel').textContent = 'Disconnected';
        setTimeout(connectWs, 3000);
      };
      ws.onerror = () => { ws.close() };
    })
    .catch(() => {
      $('wsLabel').textContent = 'WS unavailable';
      setInterval(pollNew, 5000);
    });
}

function pollNew(){
  fetch(API + '/api/messages')
    .then(r => r.json())
    .then(data => {
      if(data.messages) data.messages.forEach(m => addMessage(m, true));
    })
    .catch(()=>{});
}

function addMessage(msg, scroll){
  const key = msg.username + ':' + msg.timestamp;
  if(seen.has(key)) return;
  seen.add(key);

  const el = $('messages');
  const empty = el.querySelector('.empty');
  if(empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + (msg.username === username ? 'self' : 'other');

  const nameEl = document.createElement('div');
  nameEl.className = 'name';
  nameEl.textContent = msg.username;

  const textEl = document.createElement('div');
  textEl.textContent = msg.text;

  const timeEl = document.createElement('div');
  timeEl.className = 'time';
  const d = new Date(msg.timestamp);
  timeEl.textContent = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

  div.appendChild(nameEl);
  div.appendChild(textEl);
  div.appendChild(timeEl);
  el.appendChild(div);

  if(scroll !== false){
    el.scrollTop = el.scrollHeight;
  }
}

function send(){
  const text = $('msgInput').value.trim();
  if(!text) return;
  $('sendBtn').disabled = true;
  fetch(API + '/api/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: username, text: text})
  })
  .then(r => r.json())
  .then(msg => {
    addMessage(msg, true);
    $('msgInput').value = '';
  })
  .catch(()=>{})
  .finally(()=>{ $('sendBtn').disabled = false });
  $('msgInput').focus();
}
</script>
</body>
</html>
